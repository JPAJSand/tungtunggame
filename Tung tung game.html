<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Escape Tung Tung (Mobile)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 16px;
            left: 16px;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 10;
        }
        h1 { margin: 0 0 4px 0; font-size: 20px; color: #ffeb3b; }
        p { margin: 2px 0; font-size: 14px; opacity: 0.9; }
        
        /* Virtual Joystick UI */
        #joystick-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: block;
            z-index: 10;
            touch-action: none;
        }
        #joystick-knob {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #win-screen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #4caf50;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid #4caf50;
            width: 80%;
            max-width: 300px;
            z-index: 20;
        }
        #win-screen button {
            background: #4caf50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 16px;
            width: 100%;
            font-weight: bold;
        }
    </style>
    <!-- Include Three.js for 3D Graphics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h1>Escape Room: Tung Tung!</h1>
        <p>Use the joystick on the bottom left to move</p>
        <p id="objective" style="font-weight: bold; color: #ffeb3b; margin-top: 8px;">Objective: Find the Yellow Key!</p>
    </div>

    <!-- Joystick Element -->
    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>

    <div id="win-screen">
        <h2>YOU ESCAPED! 🎉</h2>
        <p>You bounced your way out!</p>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- Game Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.06);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // Optimizing renderer performance for older/budget mobile devices
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap pixel ratio at 2 for performance
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 15);
        dirLight.castShadow = true;
        // Optimize mobile shadows
        dirLight.shadow.mapSize.width = 512;
        dirLight.shadow.mapSize.height = 512;
        scene.add(dirLight);

        // --- Environment ---
        const floorGeo = new THREE.BoxGeometry(40, 1, 40);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x222831, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.position.y = -0.5;
        floor.receiveShadow = true;
        scene.add(floor);

        const wallMat = new THREE.MeshStandardMaterial({ color: 0x393e46 });
        const createWall = (w, h, d, x, y, z) => {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geo, wallMat);
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            return mesh;
        };

        // Maze Build
        createWall(40, 5, 1, 0, 2.5, -20);
        createWall(40, 5, 1, 0, 2.5, 20);
        createWall(1, 5, 40, -20, 2.5, 0);
        createWall(1, 5, 40, 20, 2.5, 0);

        createWall(15, 5, 1, -5, 2.5, -10);
        createWall(1, 5, 15, 5, 2.5, 5);
        createWall(15, 5, 1, -10, 2.5, 10);
        createWall(1, 5, 15, -5, 2.5, -5);

        // --- Game Objects ---
        const playerGeo = new THREE.SphereGeometry(1, 24, 24); // reduced geometry detail slightly for mobile
        const playerMat = new THREE.MeshStandardMaterial({ color: 0x00adb5, roughness: 0.2, metalness: 0.3 });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.set(15, 1, 15);
        player.castShadow = true;
        scene.add(player);

        const keyGeo = new THREE.TorusGeometry(0.5, 0.15, 8, 16);
        const keyMat = new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffd700, emissiveIntensity: 0.4 });
        const key = new THREE.Mesh(keyGeo, keyMat);
        key.position.set(-15, 1.3, -15);
        scene.add(key);

        const doorGeo = new THREE.CylinderGeometry(1.3, 1.3, 0.1, 24);
        const doorMat = new THREE.MeshStandardMaterial({ color: 0x4caf50, emissive: 0x4caf50, emissiveIntensity: 0.2 });
        const door = new THREE.Mesh(doorGeo, doorMat);
        door.position.set(-15, 0.05, 15);
        scene.add(door);

        // --- Game State & Mobile Inputs ---
        let hasKey = false;
        let gameActive = true;
        
        let moveX = 0;
        let moveZ = 0;
        const moveSpeed = 0.14;
        
        let bounceTimer = 0;
        const bounceSpeed = 9; 
        const bounceHeight = 0.7;

        // --- Mobile Joystick Logic ---
        const joystickContainer = document.getElementById('joystick-container');
        const joystickKnob = document.getElementById('joystick-knob');
        
        let joystickActive = false;
        let touchStartX = 0;
        let touchStartY = 0;
        const maxStickDistance = 35; // How far the knob can slide

        function handleJoystickMove(touchX, touchY) {
            let deltaX = touchX - touchStartX;
            let deltaY = touchY - touchStartY;
            let distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

            if (distance > maxStickDistance) {
                deltaX = (deltaX / distance) * maxStickDistance;
                deltaY = (deltaY / distance) * maxStickDistance;
                distance = maxStickDistance;
            }

            // Visual move of the knob UI
            joystickKnob.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

            // Convert joystick vector into movement ratios (-1 to 1)
            moveX = (deltaX / maxStickDistance) * moveSpeed;
            moveZ = (deltaY / maxStickDistance) * moveSpeed;
        }

        window.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            // Only activate if touching the left half of the screen
            if (touch.clientX < window.innerWidth / 2) {
                joystickActive = true;
                
                // Teleport joystick container to where user touches to make it ergonomic
                joystickContainer.style.left = `${touch.clientX - 50}px`;
                joystickContainer.style.bottom = `${window.innerHeight - touch.clientY - 50}px`;
                
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (!joystickActive) return;
            const touch = e.touches[0];
            handleJoystickMove(touch.clientX, touch.clientY);
        }, { passive: false });

        window.addEventListener('touchend', () => {
            joystickActive = false;
            // Reset knob visual position
            joystickKnob.style.transform = `translate(0px, 0px)`;
            // Reset movement speeds
            moveX = 0;
            moveZ = 0;
        });

        // Smart screen resize handling
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Core Loop ---
        function animate() {
            requestAnimationFrame(animate);
            if (!gameActive) return;

            // Apply calculated mobile movement vectors
            player.position.x += moveX;
            player.position.z += moveZ;

            // Wall boundary checks
            player.position.x = Math.max(-18.5, Math.min(18.5, player.position.x));
            player.position.z = Math.max(-18.5, Math.min(18.5, player.position.z));

            // Dynamic "Tung Tung" bounce animation based on joystick pull
            if (moveX !== 0 || moveZ !== 0) {
                bounceTimer += bounceSpeed * 0.035;
                player.position.y = 1 + Math.abs(Math.sin(bounceTimer)) * bounceHeight;
                // Mesh rotational effect
                player.rotation.x += moveZ * 0.4;
                player.rotation.z -= moveX * 0.4;
            } else {
                player.position.y = THREE.MathUtils.lerp(player.position.y, 1, 0.2);
            }

            // Passive animation cycles
            key.rotation.y += 0.02;
            key.position.y = 1.3 + Math.sin(Date.now() * 0.003) * 0.15;
            door.rotation.y += 0.01;

            // Smooth camera trailing
            camera.position.set(player.position.x, player.position.y + 11, player.position.z + 13);
            camera.lookAt(player.position);

            // Item/Objective collisions
            if (!hasKey && player.position.distanceTo(key.position) < 1.8) {
                hasKey = true;
                scene.remove(key);
                document.getElementById('objective').innerText = "Objective: Get to the Green Portal!";
                document.getElementById('objective').style.color = "#4caf50";
                doorMat.emissiveIntensity = 0.9;
            }

            if (hasKey && player.position.distanceTo(door.position) < 1.8) {
                gameActive = false;
                document.getElementById('win-screen').style.display = 'block';
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
